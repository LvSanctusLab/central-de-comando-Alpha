<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>CENTRAL_ALPHA</title>
</head>
<body>

    <div id="boot-screen" class="tela" style="display: block;">
        <p>> INICIANDO ARQUIVOS_ALPHA...</p>
        <p id="loading">></p>
    </div>

    <div id="login-screen" class="tela">
        <p>> ACESSO RESTRITO. INSIRA A SENHA:</p>
        <input type="password" id="senha" maxlength="8">
        <button onclick="verificarSenha()">ENTRAR</button>
    </div>

    <div id="main-screen" class="tela">
        <p>> BEM-VINDO AO TERMINAL ALPHA.</p>
        <p>> ARQUIVOS ENCONTRADOS:</p>
        <button onclick="abrirArquivo('05.05.2025')">> 05.05.2025.log</button>
    </div>

    <div id="file-screen" class="tela">
        <div id="file-content" style="white-space: pre-wrap; margin-bottom: 20px;"></div>
        <button onclick="voltarAoMenu()">[ VOLTAR ]</button>
    </div>

    <script>
        // Simulando Boot
        setTimeout(() => { document.getElementById('loading').innerText = "> CARREGAMENTO CONCLUÍDO."; }, 1500);
        setTimeout(() => { 
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
        }, 3000);

        function verificarSenha() {
            if (document.getElementById('senha').value === "24062025") { //Mude sua senha aqui
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'block';
            } else { alert("SENHA INCORRETA."); }
        }

        // Função que abre o "sub-arquivo"
        function abrirArquivo(id) {
            const textos = {
                '05.05.2025': "AQUI VOCÊ VAI COLAR O TEXTO LONGO DO 05.05.2025. Ele pode ser grande, ter quebras de linha e o sistema vai exibir tudo certinho para o seu amigo ler."
            };
            
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('file-content').innerText = textos[id];
            document.getElementById('file-screen').style.display = 'block';
        }

        function voltarAoMenu() {
            document.getElementById('file-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
        }
    </script>
</body>
</html>
